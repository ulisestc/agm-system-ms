$kind: http-request
name: Registrar Asistencia por QR
method: POST
url: '{{base_url_asistencias}}/asistencias/registrar'
order: 3000
headers:
  - key: Authorization
    value: 'Bearer {{auth_token}}'
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "alumno_id": "{{alumno_id}}",
      "materia_id": "{{materia_id}}",
      "token_qr": "{{token_qr}}"
    }
