$kind: http-request
name: Registrar Calificación
method: POST
url: '{{base_url_calificaciones}}/calificaciones'
order: 4000
headers:
  - key: Authorization
    value: 'Bearer {{auth_token}}'
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "actividad_id": "{{actividad_id}}",
      "alumno_id": "{{alumno_id}}",
      "valor": 85.5
    }
