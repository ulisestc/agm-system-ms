    value: 'Bearer {{auth_token}}'
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "nrc": "12345",
      "nombre": "Servicios Web",
      "seccion": "001",
      "clave": "ISW-302",
      "docente_id": 10,
      "docente_nombre": "Dra. López",
      "horario": "Lunes 10:00-12:00",
      "periodo_id": 1,
      "activo": true
    }
