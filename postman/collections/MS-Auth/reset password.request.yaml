$kind: http-request
name: Reset Password
method: POST
url: '{{base_url_auth}}/auth/reset-password'
order: 7000
headers:
  - key: Authorization
    value: 'Bearer {{auth_token}}'
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "token": "TOKEN_RECIBIDO_EN_FORGOT_PASSWORD",
      "new_password": "nueva_password_segura"
    }
