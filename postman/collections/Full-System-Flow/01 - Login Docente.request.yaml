$kind: http-request
name: 01 - Login Docente
method: POST
url: '{{base_url_auth}}/auth/login'
order: 100
headers:
  - key: Content-Type
    value: application/x-www-form-urlencoded
body:
  type: urlencoded
  content:
    - key: username
      value: '{{docente_email}}'
    - key: password
      value: '{{password}}'
    - key: grant_type
      value: password
