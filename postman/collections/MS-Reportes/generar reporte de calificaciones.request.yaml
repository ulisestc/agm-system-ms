$kind: http-request
name: Generar Reporte de Calificaciones
method: POST
url: '{{base_url_reportes}}/reportes/calificaciones/:materia_id'
order: 3000
headers:
  - key: Authorization
    value: 'Bearer {{auth_token}}'
  - key: Content-Type
    value: application/json
queryParams:
  - key: formato
    value: pdf
pathVariables:
  - key: materia_id
    value: '{{materia_id}}'
body:
  type: json
  content: |-
    {
      "docente_id": "{{docente_id}}",
      "alumnos": []
    }
