$kind: http-request
name: Importar Alumnos desde Excel
method: POST
url: '{{base_url_docentes}}/alumnos/importar/{{materia_id}}'
order: 1300
headers:
  - key: Authorization
    value: 'Bearer {{auth_token}}'
  - key: Content-Type
    value: multipart/form-data
body:
  type: formdata
  content:
    - key: archivo
      type: file
      src: './fixtures/alumnos-inscritos.xlsx'
