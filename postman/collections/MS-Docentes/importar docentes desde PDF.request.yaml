$kind: http-request
name: Importar Docentes desde PDF
method: POST
url: "{{base_url_docentes}}/docentes/importar"
order: 1100
headers:
  Authorization: Bearer {{auth_token}}
  Content-Type: multipart/form-data
body:
  type: formdata
  content:
    - type: file
      key: archivo
      src: ./docs/personal_docente.pdf
