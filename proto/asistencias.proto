syntax = "proto3";
package asistencias;

service AsistenciasService {
    // Devuelve el historial de asistencias de un alumno en una materia
    rpc GetAsistenciaAlumno (AlumnoMateriaRequest) returns (AsistenciaListResponse);
    // Devuelve las estadísticas generales de una materia
    rpc GetEstadisticasAsistencia (MateriaRequest) returns (EstadisticasResponse);
}

message AlumnoMateriaRequest {
    string alumnoId = 1;
    string materiaId = 2;
}

message MateriaRequest {
    string materiaId = 1;
}

message AsistenciaRecord {
    string estado = 1;
    string hora_registro = 2;
}

message AsistenciaListResponse {
    repeated AsistenciaRecord asistencias = 1;
}

message EstadisticasResponse {
    int32 total_sesiones = 1;
    int32 total_asistencias = 2;
    int32 total_retardos = 3;
}