syntax = "proto3";

package reportes;

// Servicio gRPC que ms-reportes expone hacia otros microservicios internos
service ReportesService {

    // Genera un reporte de calificaciones en el formato solicitado (pdf | xls)
    // Llamado por: ms-calificaciones o el Gateway cuando necesita el archivo
    rpc GenerateCalificacionesReport (ReportRequest) returns (ReportResponse);

    // Genera un reporte de asistencias en el formato solicitado (pdf | xls)
    rpc GenerateAsistenciasReport (ReportRequest) returns (ReportResponse);

    // Devuelve el historial de estadísticas de un docente por periodo
    // Llamado por: el Gateway para construir el dashboard del docente
    rpc GetHistorialDocente (DocenteIdRequest) returns (HistorialDocenteResponse);
}

// --- Payloads (entrada) ---

message ReportRequest {
    string materiaId  = 1;  // ID de la materia
    string formato    = 2;  // "pdf" o "xls"
}

message DocenteIdRequest {
    string docenteId = 1;
}

// --- Payloads (salida) ---

// Devuelve el archivo como bytes + metadata para que el consumidor pueda descargarlo
message ReportResponse {
    bool   success       = 1;
    bytes  file_bytes    = 2;  // Contenido binario del archivo generado
    string filename      = 3;  // Nombre sugerido: "calificaciones_NRC.pdf"
    string content_type  = 4;  // "application/pdf" o "application/vnd.ms-excel"
    string error_message = 5;
}

// Un periodo con sus estadísticas para el historial del docente
message StatsPeriodo {
    string periodo_nombre    = 1;
    string materia_nombre    = 2;
    string materia_nrc       = 3;
    int32  total_alumnos     = 4;
    float  promedio_general  = 5;
    float  porcentaje_aprobados = 6;
}

message HistorialDocenteResponse {
    bool                   success      = 1;
    repeated StatsPeriodo  periodos     = 2;
    string                 error_message = 3;
}
