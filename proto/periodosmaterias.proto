syntax = "proto3";

package agm.periodosmaterias.v1;

message Empty {}

message PeriodoIdRequest {
  int64 id = 1;
}

message MateriaIdRequest {
  int64 id = 1;
}

message MateriaByPeriodoRequest {
  int64 periodo_id = 1;
}

message MateriaByDocenteRequest {
  int64 docente_id = 1;
}

message MateriaByNrcRequest {
  string nrc = 1;
}

message PeriodoMessage {
  int64 id = 1;
  string nombre = 2;
  string fecha_inicio = 3;
  string fecha_fin = 4;
  string plan_estudios = 5;
  bool activo = 6;
}

message MateriaMessage {
  int64 id = 1;
  string nrc = 2;
  string nombre = 3;
  string seccion = 4;
  string clave = 5;
  int64 docente_id = 6;
  string docente_nombre = 7;
  string horario = 8;
  int64 periodo_id = 9;
  bool activo = 10;
}

message PeriodoResponse {
  bool success = 1;
  string message = 2;
  PeriodoMessage data = 3;
}

message PeriodosResponse {
  bool success = 1;
  string message = 2;
  repeated PeriodoMessage data = 3;
}

message MateriaResponse {
  bool success = 1;
  string message = 2;
  MateriaMessage data = 3;
}

message MateriasResponse {
  bool success = 1;
  string message = 2;
  repeated MateriaMessage data = 3;
}

service PeriodosMateriasService {
  rpc GetPeriodoById(PeriodoIdRequest) returns (PeriodoResponse);
  rpc GetPeriodoActivo(Empty) returns (PeriodoResponse);
  rpc ListPeriodos(Empty) returns (PeriodosResponse);

  rpc GetMateriaById(MateriaIdRequest) returns (MateriaResponse);
  rpc GetMateriaByNrc(MateriaByNrcRequest) returns (MateriaResponse);
  rpc ListMaterias(Empty) returns (MateriasResponse);
  rpc ListMateriasByPeriodo(MateriaByPeriodoRequest) returns (MateriasResponse);
  rpc ListMateriasByDocente(MateriaByDocenteRequest) returns (MateriasResponse);
}
