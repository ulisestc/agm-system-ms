version: '3.8'

services:
  # Motor de Postgres para todos los microservicios
  postgres-db:
    image: postgres:15-alpine
    container_name: agm_postgres_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    ports:
      - "5432:5432"
    volumes:
      - agm_db_data:/var/lib/postgresql/data
      - ./infrastructure/init.sql:/docker-entrypoint-initdb.d/init.sql
  smtp4dev:
    image: rnwood/smtp4dev
    container_name: agm_smtp
    ports:
      - "5000:80"
      - "25:25"

  # Caché para sesiones temporales de códigos QR
  redis-db:
    image: redis:7-alpine
    container_name: agm_redis_db
    restart: always
    ports:
      - "6379:6379"

  # MS-5 Asistencias QR
  ms-asistencias:
    build: ./microservices/ms-asistencias
    container_name: agm_ms_asistencias
    restart: always
    ports:
      - "8005:8005"
      - "50055:50055"
    environment:
      - DATABASE_URL=postgresql://postgres:root@postgres-db:5432/attendance_db
      - REDIS_URL=redis://redis-db:6379/0
      - GRPC_PORT=50055
    depends_on:
      - postgres-db
      - redis-db
    
  ms-notificaciones:
      build: 
        context: .
        dockerfile: microservices/ms-notificaciones/Dockerfile
      container_name: agm_ms_notificaciones
      restart: always
      env_file:
        - ./microservices/ms-notificaciones/.env
      environment:
        - DATABASE_URL=postgresql://postgres:root@postgres-db:5432/agm_notificaciones_db
        - SMTP_HOST=smtp4dev
        - MS_MATERIAS_URL=ms-materias:50052
        - MS_ALUMNOS_URL=ms-auth:50053
      ports:
        - "50056:50056"
      depends_on:
        - postgres-db
        - smtp4dev

  # MS-3 Docentes & Alumnos
  ms-docentes:
    build: ./microservices/ms-docentes
    container_name: agm_ms_docentes
    restart: always
    ports:
      - "8003:8003"
      - "50053:50053"
    environment:
      - DB_URL=postgresql://postgres:root@postgres-db:5432/agm_docentes_db
      - REST_PORT=8003
      - GRPC_PORT=50053
    depends_on:
      - postgres-db

  ms-periodos-materias:
    build:
      context: ./microservices/ms-periodos-materias
    container_name: agm_ms_periodos_materias
    restart: always
    env_file:
      - ./microservices/ms-periodos-materias/.env
    environment:
      - DB_ENGINE=django.db.backends.postgresql
      - DB_HOST=postgres-db
      - DB_PORT=5432
      - DB_NAME=agm_periodos_materias_db
      - DB_USER=postgres
      - DB_PASSWORD=root
      - GRPC_PORT=50052
    ports:
      - "8001:8000"
      - "50052:50052"
    depends_on:
      - postgres-db
  # MS-7 Reportes
  ms-reportes:
      build: ./microservices/ms-reportes
      container_name: agm_ms_reportes
      restart: always
      ports:
        - "8007:8007"
        - "50057:50057"
      environment:
        - DATABASE_URL=postgresql://postgres:root@postgres-db:5432/reports_db
        - GRPC_PORT=50057
      depends_on:
        - postgres-db

volumes:
  agm_db_data:
