syntax = "proto3";

package agm.periodos.v1;

message Empty {}

message PeriodoIdRequest {
  int64 id = 1;
}

message PeriodoMessage {
  int64 id = 1;
  string nombre = 2;
  string fecha_inicio = 3;
  string fecha_fin = 4;
  string plan_estudios = 5;
  bool activo = 6;
}

message PeriodoResponse {
  bool success = 1;
  string message = 2;
  PeriodoMessage data = 3;
}

message PeriodosResponse {
  bool success = 1;
  string message = 2;
  repeated PeriodoMessage data = 3;
}

service PeriodosService {
  rpc GetPeriodoById(PeriodoIdRequest) returns (PeriodoResponse);
  rpc GetPeriodoActivo(Empty) returns (PeriodoResponse);
  rpc ListPeriodos(Empty) returns (PeriodosResponse);
}
